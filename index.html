<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrera FC · Compañero del Modo Carrera</title>
  <meta name="description" content="El compañero definitivo del Modo Carrera de EA Sports FC: tracking, clasificaciones, retos y la historia de tu club." />
  <style>
/* ============================================================
   Carrera FC — estilos
   Tema oscuro por defecto (data-theme="dark"), variante clara.
   ============================================================ */

:root {
  --accent: #00e1a0;          /* verde césped neón */
  --accent-2: #1f8fff;        /* azul */
  --accent-3: #ffd02e;        /* dorado trofeo */
  --danger: #ff5470;
  --warn: #ffb02e;
  --ok: #36d399;

  --radius: 14px;
  --radius-sm: 9px;
  --radius-lg: 20px;
  --shadow: 0 10px 30px -12px rgba(0,0,0,.55);
  --shadow-sm: 0 4px 14px -8px rgba(0,0,0,.5);
  --maxw: 1180px;
  --sidebar-w: 244px;
  --font: "Inter", "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
}

[data-theme="dark"] {
  --bg: #0b1015;
  --bg-2: #0f1620;
  --panel: #141d29;
  --panel-2: #1a2535;
  --panel-3: #21304380;
  --line: #243246;
  --line-strong: #33475f;
  --text: #eaf1f8;
  --text-dim: #93a6bd;
  --text-faint: #62748c;
  --chip: #1c2838;
}

[data-theme="light"] {
  --bg: #eef2f7;
  --bg-2: #e6ecf3;
  --panel: #ffffff;
  --panel-2: #f5f8fc;
  --panel-3: #eef3f9;
  --line: #dde5ef;
  --line-strong: #c7d3e2;
  --text: #0e1a28;
  --text-dim: #56657a;
  --text-faint: #8595a8;
  --chip: #eef3f9;
  --accent: #00b585;
  --shadow: 0 10px 30px -16px rgba(20,40,70,.3);
}

* { box-sizing: border-box; }
[hidden] { display: none !important; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font);
  background:
    radial-gradient(1200px 700px at 80% -10%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, color-mix(in srgb, var(--accent-2) 9%, transparent), transparent 55%),
    var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.45;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
::selection { background: color-mix(in srgb, var(--accent) 40%, transparent); }

/* Scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--line-strong) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 20px; border: 3px solid transparent; background-clip: content-box; }

/* ===================== Layout ===================== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

.sidebar {
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  gap: 6px;
  padding: 18px 14px;
  background: linear-gradient(180deg, var(--bg-2), color-mix(in srgb, var(--bg-2) 70%, #000));
  border-right: 1px solid var(--line);
  z-index: 40;
}
.brand { display: flex; align-items: center; gap: 11px; padding: 6px 8px 14px; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 11px; flex: none;
  display: grid; place-items: center; font-weight: 800; letter-spacing: .5px;
  color: #03110c;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #ffffff));
  box-shadow: 0 6px 18px -6px color-mix(in srgb, var(--accent) 60%, transparent);
}
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text strong { font-size: 15px; }
.brand-text span { font-size: 11px; color: var(--text-dim); }

.career-switch { margin: 2px 4px 12px; }
.career-chip {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; border-radius: var(--radius-sm); cursor: pointer;
  background: var(--panel); border: 1px solid var(--line);
  color: var(--text); text-align: left;
}
.career-chip:hover { border-color: var(--line-strong); }
.career-badge { width: 26px; height: 26px; border-radius: 7px; flex: none; display:grid; place-items:center; font-size:11px; font-weight:800; color:#fff; }
.career-chip .cc-meta { flex: 1; min-width: 0; }
.career-chip .cc-meta b { display:block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.career-chip .cc-meta small { color: var(--text-dim); font-size: 11px; }
.career-chip .cc-caret { color: var(--text-dim); }

.nav { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; overflow-y: auto; flex: 1; padding-bottom: 6px; }
.nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--text-faint); padding: 10px 12px 4px; }
.nav:first-child .nav-label:first-child { padding-top: 2px; }
.nav-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 3px; position: relative; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  color: var(--text-dim); font-size: 14px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--panel); color: var(--text); }
.nav-item.active {
  background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 18%, transparent), transparent);
  color: var(--text); border-color: color-mix(in srgb, var(--accent) 35%, transparent);
}
.nav-item.active .ni-icon { color: var(--accent); }
.ni-icon { width: 19px; height: 19px; flex: none; color: currentColor; display:inline-flex; }
.ni-icon svg { width: 100%; height: 100%; }
.theme-toggle {
  position: absolute; right: 6px; bottom: 6px;
  width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line);
  background: var(--panel); color: var(--text-dim); cursor: pointer; display: grid; place-items: center;
}
.theme-toggle:hover { color: var(--text); }

.topbar { display: none; }

.content {
  padding: 26px clamp(16px, 3vw, 38px) 80px;
  max-width: var(--maxw);
  width: 100%;
  margin: 0 auto;
  outline: none;
}

/* ===================== Typography & headers ===================== */
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.page-head h1 { font-size: clamp(22px, 3vw, 30px); margin: 0; letter-spacing: -.5px; }
.page-head .sub { color: var(--text-dim); font-size: 14px; margin-top: 3px; }
.section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .14em; color: var(--text-dim); margin: 26px 2px 12px; font-weight: 700; }
.muted { color: var(--text-dim); }
.faint { color: var(--text-faint); }

/* ===================== Cards / grid ===================== */
.grid { display: grid; gap: 16px; }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-4 { grid-template-columns: repeat(4, 1fr); }
.span-2 { grid-column: span 2; }

.card {
  background: linear-gradient(180deg, var(--panel), color-mix(in srgb, var(--panel) 88%, #000));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-sm);
}
.card.tight { padding: 14px; }
.card h3 { margin: 0 0 12px; font-size: 15px; display:flex; align-items:center; gap:8px; }
.card .card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 14px; }
.card .card-head h3 { margin: 0; }

/* Stat tiles */
.stat-tile { position: relative; overflow: hidden; }
.stat-tile .st-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
.stat-tile .st-value { font-size: 30px; font-weight: 800; letter-spacing: -.5px; margin-top: 6px; line-height: 1; }
.stat-tile .st-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
.stat-tile .st-glow { position: absolute; right: -20px; top: -20px; width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle, color-mix(in srgb, var(--accent) 28%, transparent), transparent 70%); }

/* ===================== Buttons ===================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px; justify-content:center;
  padding: 10px 16px; border-radius: 10px; border: 1px solid var(--line-strong);
  background: var(--panel-2); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
  transition: transform .04s ease, border-color .15s, background .15s;
}
.btn:hover { border-color: var(--accent); }
.btn:active { transform: translateY(1px); }
.btn .ni-icon { width: 16px; height: 16px; }
.btn-sm { padding: 7px 12px; font-size: 13px; border-radius: 9px; }
.btn-lg { padding: 13px 22px; font-size: 15px; }
.btn-primary { background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #ffffff)); color: #03110c; border-color: transparent; }
.btn-primary:hover { filter: brightness(1.05); }
.btn-ghost { background: transparent; border-color: var(--line); }
.btn-danger { background: color-mix(in srgb, var(--danger) 16%, var(--panel-2)); border-color: color-mix(in srgb, var(--danger) 45%, transparent); color: #ffd7df; }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.icon-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel); color: var(--text); display: grid; place-items: center; cursor: pointer; }
.icon-btn:hover { border-color: var(--line-strong); }
.icon-btn.sm { width: 30px; height: 30px; border-radius: 8px; }

/* Swatches de acento (Ajustes → Apariencia) */
.accent-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--line); cursor: pointer; padding: 0; transition: transform .08s; }
.accent-dot:hover { transform: scale(1.08); }
.accent-dot.active { box-shadow: 0 0 0 3px var(--panel), 0 0 0 5px var(--text); }

/* ===================== Chips / badges ===================== */
.chip { display: inline-flex; align-items:center; gap:6px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--chip); border: 1px solid var(--line); color: var(--text-dim); }
.chip.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.chip.gold { color: var(--accent-3); border-color: color-mix(in srgb, var(--accent-3) 40%, transparent); background: color-mix(in srgb, var(--accent-3) 12%, transparent); }
.chip.danger { color: #ffb3c1; border-color: color-mix(in srgb, var(--danger) 45%, transparent); background: color-mix(in srgb, var(--danger) 14%, transparent); }
.pill-w, .pill-d, .pill-l { width: 22px; height: 22px; border-radius: 6px; display: inline-grid; place-items: center; font-size: 11px; font-weight: 800; color: #fff; }
.pill-w { background: var(--ok); } .pill-d { background: #8a99ad; } .pill-l { background: var(--danger); }

/* OVR badge */
.ovr { display:inline-grid; place-items:center; min-width: 34px; height: 30px; padding: 0 6px; border-radius: 8px; font-weight: 800; font-size: 14px; color:#06140f; background: linear-gradient(135deg,#ffe28a,#ffc24d); }
.ovr.mid { background: linear-gradient(135deg,#cfe0ee,#a8c0d6); }
.ovr.low { background: linear-gradient(135deg,#d7b08a,#c69a6f); }

/* ===================== Tables ===================== */
.squad-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.squad-toolbar input[type="search"] { flex: 1; min-width: 160px; }
.squad-toolbar select { width: auto; }
.squad-toolbar #sq-count { font-size: 12px; }
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--line); }
table.tbl { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 480px; }
table.tbl th, table.tbl td { padding: 11px 12px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
table.tbl th { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); font-weight: 700; background: var(--panel-2); position: sticky; top: 0; }
table.tbl tbody tr:hover { background: var(--panel-2); }
table.tbl td.num, table.tbl th.num { text-align: center; font-variant-numeric: tabular-nums; }
table.tbl tr.is-user { background: color-mix(in srgb, var(--accent) 10%, transparent); }
table.tbl tr.is-user:hover { background: color-mix(in srgb, var(--accent) 16%, transparent); }
table.tbl tr.is-user td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
.pos-cell { display:flex; align-items:center; gap:8px; }
.zone-bar { width: 4px; height: 18px; border-radius: 4px; background: transparent; }
.zone-ucl { background: var(--accent-2); } .zone-uel { background: var(--accent-3); } .zone-rel { background: var(--danger); }

/* ===================== Forms ===================== */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field > label { font-size: 13px; font-weight: 600; color: var(--text-dim); }
.field .hint { font-size: 12px; color: var(--text-faint); }
input[type=text], input[type=number], input[type=date], input[type=search], select, textarea {
  width: 100%; padding: 10px 12px; border-radius: 10px;
  background: var(--bg-2); border: 1px solid var(--line); color: var(--text); font-size: 14px; font-family: inherit;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
/* Foco visible por teclado en controles interactivos (accesibilidad) */
.btn:focus-visible, .icon-btn:focus-visible, .nav-item:focus-visible, .theme-toggle:focus-visible,
.career-chip:focus-visible, .seg button:focus-visible, [data-goto]:focus-visible, [data-pick]:focus-visible {
  outline: 2px solid var(--accent); outline-offset: 2px;
}
textarea { resize: vertical; min-height: 80px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
.inline-check { display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer; }
.inline-check input { width: 18px; height: 18px; accent-color: var(--accent); }
.seg { display: inline-flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 3px; }
.seg button { border: none; background: transparent; color: var(--text-dim); padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
.seg button.active { background: var(--panel); color: var(--text); box-shadow: var(--shadow-sm); }

/* ===================== Progress / bars ===================== */
.bar { height: 9px; border-radius: 999px; background: var(--bg-2); overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #ffffff)); }
.bar.gold > i { background: linear-gradient(90deg, var(--accent-3), #ffe79a); }
.bar.blue > i { background: linear-gradient(90deg, var(--accent-2), #74b6ff); }
.bar.danger > i { background: linear-gradient(90deg, var(--danger), #ff97a9); }
.obj-row { display:flex; align-items:center; gap:12px; padding: 10px 0; border-bottom: 1px dashed var(--line); }
.obj-row:last-child { border-bottom: none; }
.obj-row .obj-meta { flex:1; min-width:0; }
.obj-row .obj-meta b { font-size: 14px; font-weight: 600; }
.obj-row .obj-meta .bar { margin-top: 7px; }

/* ===================== Lists ===================== */
.list { display: flex; flex-direction: column; }
.list-row { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--line); }
.list-row:last-child { border-bottom: none; }
.list-row .lr-main { flex: 1; min-width: 0; }
.list-row .lr-main b { font-size: 14px; display:block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row .lr-main small { color: var(--text-dim); font-size: 12px; }
.avatar { width: 34px; height: 34px; border-radius: 9px; flex:none; display:grid; place-items:center; font-weight:700; font-size:13px; color:#fff; background: var(--panel-2); }
.avatar.lg { width: 58px; height: 58px; border-radius: 14px; font-size: 22px; }
/* Ficha de jugador */
.pc-head { display: flex; align-items: center; gap: 14px; }
.pc-id { min-width: 0; }
.pc-name { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 19px; }
.pc-name .chip { font-size: 11px; }
.pc-contrib { display: flex; gap: 10px; align-items: center; flex: none; font-variant-numeric: tabular-nums; font-size: 13px; }

.fixture { display:flex; align-items:center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.fixture:last-child { border-bottom: none; }
.fixture .fx-comp { font-size: 11px; color: var(--text-dim); width: 64px; flex:none; }
.fixture .fx-teams { flex: 1; display:flex; align-items:center; gap: 8px; min-width:0; }
.fixture .fx-teams .t { flex:1; min-width:0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fixture .fx-teams .t.away { text-align: right; }
.fixture .fx-score { font-weight: 800; font-variant-numeric: tabular-nums; padding: 3px 9px; border-radius: 8px; background: var(--bg-2); border:1px solid var(--line); min-width: 48px; text-align:center; }
.fixture .fx-score.win { color: var(--ok); } .fixture .fx-score.loss { color: var(--danger); }
/* Próximos partidos (programados, sin marcador) */
.fixture.upcoming .fx-vs { font-weight: 700; font-size: 12px; color: var(--text-dim); padding: 3px 9px; border-radius: 8px; background: var(--bg-2); border: 1px dashed var(--line); min-width: 48px; text-align: center; }
.fixture .up-date { font-size: 11px; color: var(--text-dim); width: 74px; text-align: right; flex: none; }
.fixture .up-actions { display: flex; align-items: center; gap: 6px; flex: none; }
/* Calendario de temporada */
.cal-month { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin: 18px 2px 6px; }
.cal-month:first-child { margin-top: 0; }
.fixture.is-next { box-shadow: inset 3px 0 0 var(--accent); padding-left: 9px; }

/* Banner "próximo partido" en el panel */
.next-match { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-top: 16px; border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); }
.next-match .nm-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.next-match .nm-left > .ni-icon { color: var(--accent); width: 22px; height: 22px; flex: none; }
.next-match .nm-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
.next-match .nm-teams { font-weight: 700; font-size: 16px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.next-match .nm-vs { color: var(--text-dim); font-weight: 600; font-size: 13px; margin: 0 4px; }

/* ===================== Empty states ===================== */
.empty { text-align: center; padding: 46px 20px; color: var(--text-dim); }
.empty .emoji { font-size: 40px; margin-bottom: 10px; }
.empty h3 { color: var(--text); margin: 0 0 6px; }

/* ===================== Hero (onboarding) ===================== */
.hero { min-height: 100vh; display:grid; place-items:center; padding: 30px 18px; }
.hero-card { max-width: 560px; width: 100%; }
.hero-logo { display:flex; align-items:center; gap:14px; justify-content:center; margin-bottom: 18px; }
.hero-logo .brand-mark { width: 54px; height: 54px; font-size: 20px; border-radius: 15px; }
.hero h1 { text-align: center; font-size: 30px; margin: 0 0 6px; letter-spacing: -.6px; }
.hero p.lead { text-align:center; color: var(--text-dim); margin: 0 0 26px; }

/* ===================== Modal ===================== */
.modal-overlay { position: fixed; inset: 0; background: rgba(4,8,12,.62); backdrop-filter: blur(4px); display: grid; place-items: center; padding: 18px; z-index: 100; }
.modal { background: var(--panel); border: 1px solid var(--line-strong); border-radius: var(--radius-lg); width: min(620px, 100%); max-height: 90vh; overflow: auto; box-shadow: var(--shadow); }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding: 18px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 2; }
.modal-head h2 { margin: 0; font-size: 18px; }
.modal-body { padding: 20px; }
.modal-foot { padding: 16px 20px; border-top: 1px solid var(--line); display:flex; gap: 10px; justify-content: flex-end; position: sticky; bottom: 0; background: var(--panel); }
.modal.lg { width: min(860px, 100%); }

/* ===================== Toasts ===================== */
.toast-stack { position: fixed; right: 18px; bottom: 18px; display:flex; flex-direction: column; gap: 10px; z-index: 200; }
.toast { display:flex; align-items:center; gap: 10px; padding: 12px 16px; border-radius: 12px; background: var(--panel); border: 1px solid var(--line-strong); box-shadow: var(--shadow); font-size: 14px; animation: toastIn .25s ease; max-width: 360px; }
.toast.ok { border-color: color-mix(in srgb, var(--ok) 50%, transparent); }
.toast.err { border-color: color-mix(in srgb, var(--danger) 50%, transparent); }
.toast .ni-icon { color: var(--accent); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity:1; transform: none; } }

/* ===================== Achievements / challenges ===================== */
.ach-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; }
.ach { text-align:center; padding: 16px 12px; border-radius: var(--radius); border:1px solid var(--line); background: var(--panel-2); position: relative; }
.ach.locked { opacity: .5; filter: grayscale(.6); }
.ach .ach-medal { font-size: 30px; }
.ach .ach-name { font-weight: 700; font-size: 13px; margin-top: 6px; }

  color: #03110c;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 62%, var(--accent-2)));

  /* ============================================================
     MOTOR DE REGLAS (validador-vigilante de retos)
     Cada regla: id, label, desc, params, check(career,params)=>[violations]
     Una violación: { text }
     Las reglas se apoyan en career.transfers y career.players.
     ============================================================ */
  function inSignings(career) {
    return (career.transfers || []).filter(t => t.direction === "in");
  }
  D.RULES = {
    "no-signings": {
      label: "Sin fichajes",
      desc: "No puedes incorporar a nadie de fuera. Solo cantera y agentes libres prohibidos.",
      check(career) {
        return inSignings(career)
          .filter(t => t.type !== "youth")
          .map(t => ({ text: `Fichaje no permitido: ${t.player} (${t.type === "free" ? "libre" : "traspaso"})` }));
      },
    },
    "youth-only": {
      label: "Solo cantera",
      desc: "Toda incorporación debe salir de tu academia juvenil.",
      check(career) {
        return inSignings(career)
          .filter(t => t.type !== "youth")
          .map(t => ({ text: `${t.player} no proviene de la cantera` }));
      },
    },
    "free-agents-only": {
      label: "Solo agentes libres",
      desc: "Solo puedes incorporar agentes libres (ni traspasos ni cesiones).",
      check(career) {
        return inSignings(career)
          .filter(t => t.type !== "youth" && t.type !== "free")
          .map(t => ({ text: `${t.player} no es agente libre (${t.type === "loan" ? "cesión" : "traspaso" + (Number(t.fee) > 0 ? " de " + FC.util.money(t.fee) : "")})` }));
      },
    },
    "no-loans": {
      label: "Sin cesiones",
      desc: "No puedes traer jugadores cedidos.",
      check(career) {
        return inSignings(career)
          .filter(t => t.type === "loan")
          .map(t => ({ text: `${t.player} llegó cedido` }));
      },
    },
    "one-nationality": {
      label: "Una sola nacionalidad",
      desc: "Toda tu plantilla debe compartir la nacionalidad indicada.",
      params: [{ key: "nationality", label: "Nacionalidad permitida", type: "text", placeholder: "p.ej. España" }],
      check(career, p) {
        if (!p || !p.nationality) return [];
        const want = p.nationality.trim().toLowerCase();
        return (career.players || [])
          .filter(pl => (pl.nationality || "").trim().toLowerCase() !== want)
          .map(pl => ({ text: pl.nationality ? `${pl.name} es de ${pl.nationality}, no ${p.nationality}` : `${pl.name} no tiene nacionalidad asignada` }));
      },
    },
    "max-spend": {
      label: "Tope de gasto",
      desc: "Tu gasto total en fichajes no puede superar el límite.",
      params: [{ key: "amount", label: "Gasto máximo (€)", type: "number", placeholder: "p.ej. 50000000" }],
      check(career, p) {
        if (!p || !p.amount) return [];
        const total = inSignings(career).reduce((s, t) => s + (Number(t.fee) || 0), 0);
        const max = Number(p.amount);
        return total > max ? [{ text: `Gasto total ${FC.util.money(total)} supera el tope ${FC.util.money(max)}` }] : [];
      },
    },
    "sell-before-buy": {
      label: "Vende antes de comprar",
      desc: "No puedes gastar más de lo que ingresas por ventas.",
      check(career) {
        const inFees = inSignings(career).reduce((s, t) => s + (Number(t.fee) || 0), 0);
        const outFees = (career.transfers || []).filter(t => t.direction === "out").reduce((s, t) => s + (Number(t.fee) || 0), 0);
        return inFees > outFees
          ? [{ text: `Gastado ${FC.util.money(inFees)} vs ingresado ${FC.util.money(outFees)} (saldo negativo)` }]
          : [];
      },
    },
    "max-age": {
      label: "Solo jóvenes",
      desc: "No puedes tener jugadores por encima de la edad indicada.",
      params: [{ key: "age", label: "Edad máxima", type: "number", placeholder: "p.ej. 23" }],
      check(career, p) {
        if (!p || !p.age) return [];
        const max = Number(p.age);
        return (career.players || [])
          .filter(pl => { const a = Number(pl.age); return !Number.isFinite(a) || a > max; })
          .map(pl => { const a = Number(pl.age); return { text: Number.isFinite(a) ? `${pl.name} tiene ${pl.age} años (máx ${max})` : `${pl.name} no tiene edad asignada` }; });
      },
    },

  /* ============================================================
     CHARTS (SVG ligero, sin dependencias)
     ============================================================ */
  const C = {};
  C.line = (values, opts) => {
    opts = opts || {};
    const w = opts.w || 320, hh = opts.h || 90, pad = 8;
    if (!values.length) return `<svg viewBox="0 0 ${w} ${hh}"></svg>`;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const stepX = (w - pad * 2) / Math.max(1, values.length - 1);
    const pts = values.map((v, i) => [pad + i * stepX, hh - pad - ((v - min) / range) * (hh - pad * 2)]);
    const d = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
    const area = d + ` L ${pts[pts.length-1][0].toFixed(1)} ${hh-pad} L ${pad} ${hh-pad} Z`;
    const col = opts.color || "var(--accent)";
    return `<svg viewBox="0 0 ${w} ${hh}" preserveAspectRatio="none" style="width:100%;height:${hh}px">
      <defs><linearGradient id="lg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".28"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#lg)"/>
      <path d="${d}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${col}"/>`).join("")}
    </svg>`;
  };
  C.donut = (pct, opts) => {
    opts = opts || {}; const sz = opts.size || 78, sw = opts.stroke || 9, r = (sz - sw) / 2, cx = sz / 2;
    const circ = 2 * Math.PI * r; const off = circ * (1 - U.clamp(pct, 0, 100) / 100);
    const col = opts.color || "var(--accent)";
    return `<svg viewBox="0 0 ${sz} ${sz}" style="width:${sz}px;height:${sz}px">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/>
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${cx} ${cx})"/>
      <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" font-size="${sz*0.26}" font-weight="800" fill="var(--text)">${opts.label != null ? opts.label : Math.round(pct) + "%"}</text>
    </svg>`;
  };
  C.formBar = (results) => results.map(r => `<span class="pill-${r.toLowerCase()}">${r}</span>`).join("");
  FC.charts = C;

  /* ============================================================
