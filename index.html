<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrera FC · Compañero del Modo Carrera</title>
  <meta name="description" content="El compañero definitivo del Modo Carrera de EA Sports FC: tracking, clasificaciones, retos y la historia de tu club." />
  <style>
/* ============================================================
   Carrera FC — estilos
   Tema oscuro por defecto (data-theme="dark"), variante clara.
   ============================================================ */

:root {
  --accent: #00e1a0;          /* verde césped neón */
  --accent-2: #1f8fff;        /* azul */
  --accent-3: #ffd02e;        /* dorado trofeo */
  --danger: #ff5470;
  --warn: #ffb02e;
  --ok: #36d399;

  --radius: 14px;
  --radius-sm: 9px;
  --radius-lg: 20px;
  --shadow: 0 10px 30px -12px rgba(0,0,0,.55);
  --shadow-sm: 0 4px 14px -8px rgba(0,0,0,.5);
  --maxw: 1180px;
  --sidebar-w: 244px;
  --font: "Inter", "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
}

[data-theme="dark"] {
  --bg: #0b1015;
  --bg-2: #0f1620;
  --panel: #141d29;
  --panel-2: #1a2535;
  --panel-3: #21304380;
  --line: #243246;
  --line-strong: #33475f;
  --text: #eaf1f8;
  --text-dim: #93a6bd;
  --text-faint: #62748c;
  --chip: #1c2838;
}

[data-theme="light"] {
  --bg: #eef2f7;
  --bg-2: #e6ecf3;
  --panel: #ffffff;
  --panel-2: #f5f8fc;
  --panel-3: #eef3f9;
  --line: #dde5ef;
  --line-strong: #c7d3e2;
  --text: #0e1a28;
  --text-dim: #56657a;
  --text-faint: #8595a8;
  --chip: #eef3f9;
  --accent: #00b585;
  --shadow: 0 10px 30px -16px rgba(20,40,70,.3);
}

* { box-sizing: border-box; }
[hidden] { display: none !important; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font);
  background:
    radial-gradient(1200px 700px at 80% -10%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, color-mix(in srgb, var(--accent-2) 9%, transparent), transparent 55%),
    var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.45;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
::selection { background: color-mix(in srgb, var(--accent) 40%, transparent); }

/* Scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--line-strong) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 20px; border: 3px solid transparent; background-clip: content-box; }

/* ===================== Layout ===================== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

.sidebar {
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  gap: 6px;
  padding: 18px 14px;
  background: linear-gradient(180deg, var(--bg-2), color-mix(in srgb, var(--bg-2) 70%, #000));
  border-right: 1px solid var(--line);
  z-index: 40;
}
.brand { display: flex; align-items: center; gap: 11px; padding: 6px 8px 14px; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 11px; flex: none;
  display: grid; place-items: center; font-weight: 800; letter-spacing: .5px;
  color: #03110c;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #ffffff));
  box-shadow: 0 6px 18px -6px color-mix(in srgb, var(--accent) 60%, transparent);
}
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text strong { font-size: 15px; }
.brand-text span { font-size: 11px; color: var(--text-dim); }

.career-switch { margin: 2px 4px 12px; }
.career-chip {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; border-radius: var(--radius-sm); cursor: pointer;
  background: var(--panel); border: 1px solid var(--line);
  color: var(--text); text-align: left;
}
.career-chip:hover { border-color: var(--line-strong); }
.career-badge { width: 26px; height: 26px; border-radius: 7px; flex: none; display:grid; place-items:center; font-size:11px; font-weight:800; color:#fff; }
.career-chip .cc-meta { flex: 1; min-width: 0; }
.career-chip .cc-meta b { display:block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.career-chip .cc-meta small { color: var(--text-dim); font-size: 11px; }
.career-chip .cc-caret { color: var(--text-dim); }

.nav { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
.nav-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 3px; position: relative; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  color: var(--text-dim); font-size: 14px; font-weight: 500; cursor: pointer;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--panel); color: var(--text); }
.nav-item.active {
  background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 18%, transparent), transparent);
  color: var(--text); border-color: color-mix(in srgb, var(--accent) 35%, transparent);
}
.nav-item.active .ni-icon { color: var(--accent); }
.ni-icon { width: 19px; height: 19px; flex: none; color: currentColor; display:inline-flex; }
.ni-icon svg { width: 100%; height: 100%; }
.theme-toggle {
  position: absolute; right: 6px; bottom: 6px;
  width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line);
  background: var(--panel); color: var(--text-dim); cursor: pointer; display: grid; place-items: center;
}
.theme-toggle:hover { color: var(--text); }

.topbar { display: none; }

.content {
  padding: 26px clamp(16px, 3vw, 38px) 80px;
  max-width: var(--maxw);
  width: 100%;
  margin: 0 auto;
  outline: none;
}

/* ===================== Typography & headers ===================== */
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.page-head h1 { font-size: clamp(22px, 3vw, 30px); margin: 0; letter-spacing: -.5px; }
.page-head .sub { color: var(--text-dim); font-size: 14px; margin-top: 3px; }
.section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .14em; color: var(--text-dim); margin: 26px 2px 12px; font-weight: 700; }
.muted { color: var(--text-dim); }
.faint { color: var(--text-faint); }

/* ===================== Cards / grid ===================== */
.grid { display: grid; gap: 16px; }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-4 { grid-template-columns: repeat(4, 1fr); }
.span-2 { grid-column: span 2; }

.card {
  background: linear-gradient(180deg, var(--panel), color-mix(in srgb, var(--panel) 88%, #000));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-sm);
}
.card.tight { padding: 14px; }
.card h3 { margin: 0 0 12px; font-size: 15px; display:flex; align-items:center; gap:8px; }
.card .card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 14px; }
.card .card-head h3 { margin: 0; }

/* Stat tiles */
.stat-tile { position: relative; overflow: hidden; }
.stat-tile .st-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
.stat-tile .st-value { font-size: 30px; font-weight: 800; letter-spacing: -.5px; margin-top: 6px; line-height: 1; }
.stat-tile .st-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
.stat-tile .st-glow { position: absolute; right: -20px; top: -20px; width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle, color-mix(in srgb, var(--accent) 28%, transparent), transparent 70%); }

/* ===================== Buttons ===================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px; justify-content:center;
  padding: 10px 16px; border-radius: 10px; border: 1px solid var(--line-strong);
  background: var(--panel-2); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
  transition: transform .04s ease, border-color .15s, background .15s;
}
.btn:hover { border-color: var(--accent); }
.btn:active { transform: translateY(1px); }
.btn .ni-icon { width: 16px; height: 16px; }
.btn-sm { padding: 7px 12px; font-size: 13px; border-radius: 9px; }
.btn-lg { padding: 13px 22px; font-size: 15px; }
.btn-primary { background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #ffffff)); color: #03110c; border-color: transparent; }
.btn-primary:hover { filter: brightness(1.05); }
.btn-ghost { background: transparent; border-color: var(--line); }
.btn-danger { background: color-mix(in srgb, var(--danger) 16%, var(--panel-2)); border-color: color-mix(in srgb, var(--danger) 45%, transparent); color: #ffd7df; }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.icon-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel); color: var(--text); display: grid; place-items: center; cursor: pointer; }
.icon-btn:hover { border-color: var(--line-strong); }
.icon-btn.sm { width: 30px; height: 30px; border-radius: 8px; }

/* Swatches de acento (Ajustes → Apariencia) */
.accent-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--line); cursor: pointer; padding: 0; transition: transform .08s; }
.accent-dot:hover { transform: scale(1.08); }
.accent-dot.active { box-shadow: 0 0 0 3px var(--panel), 0 0 0 5px var(--text); }

/* ===================== Chips / badges ===================== */
.chip { display: inline-flex; align-items:center; gap:6px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--chip); border: 1px solid var(--line); color: var(--text-dim); }
.chip.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.chip.gold { color: var(--accent-3); border-color: color-mix(in srgb, var(--accent-3) 40%, transparent); background: color-mix(in srgb, var(--accent-3) 12%, transparent); }
.chip.danger { color: #ffb3c1; border-color: color-mix(in srgb, var(--danger) 45%, transparent); background: color-mix(in srgb, var(--danger) 14%, transparent); }
.pill-w, .pill-d, .pill-l { width: 22px; height: 22px; border-radius: 6px; display: inline-grid; place-items: center; font-size: 11px; font-weight: 800; color: #fff; }
.pill-w { background: var(--ok); } .pill-d { background: #8a99ad; } .pill-l { background: var(--danger); }

/* OVR badge */
.ovr { display:inline-grid; place-items:center; min-width: 34px; height: 30px; padding: 0 6px; border-radius: 8px; font-weight: 800; font-size: 14px; color:#06140f; background: linear-gradient(135deg,#ffe28a,#ffc24d); }
.ovr.mid { background: linear-gradient(135deg,#cfe0ee,#a8c0d6); }
.ovr.low { background: linear-gradient(135deg,#d7b08a,#c69a6f); }

/* ===================== Tables ===================== */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--line); }
table.tbl { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 480px; }
table.tbl th, table.tbl td { padding: 11px 12px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
table.tbl th { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); font-weight: 700; background: var(--panel-2); position: sticky; top: 0; }
table.tbl tbody tr:hover { background: var(--panel-2); }
table.tbl td.num, table.tbl th.num { text-align: center; font-variant-numeric: tabular-nums; }
table.tbl tr.is-user { background: color-mix(in srgb, var(--accent) 10%, transparent); }
table.tbl tr.is-user:hover { background: color-mix(in srgb, var(--accent) 16%, transparent); }
table.tbl tr.is-user td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
.pos-cell { display:flex; align-items:center; gap:8px; }
.zone-bar { width: 4px; height: 18px; border-radius: 4px; background: transparent; }
.zone-ucl { background: var(--accent-2); } .zone-uel { background: var(--accent-3); } .zone-rel { background: var(--danger); }

/* ===================== Forms ===================== */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field > label { font-size: 13px; font-weight: 600; color: var(--text-dim); }
.field .hint { font-size: 12px; color: var(--text-faint); }
input[type=text], input[type=number], input[type=date], input[type=search], select, textarea {
  width: 100%; padding: 10px 12px; border-radius: 10px;
  background: var(--bg-2); border: 1px solid var(--line); color: var(--text); font-size: 14px; font-family: inherit;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
/* Foco visible por teclado en controles interactivos (accesibilidad) */
.btn:focus-visible, .icon-btn:focus-visible, .nav-item:focus-visible, .theme-toggle:focus-visible,
.career-chip:focus-visible, .seg button:focus-visible, [data-goto]:focus-visible, [data-pick]:focus-visible {
  outline: 2px solid var(--accent); outline-offset: 2px;
}
textarea { resize: vertical; min-height: 80px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
.inline-check { display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer; }
.inline-check input { width: 18px; height: 18px; accent-color: var(--accent); }
.seg { display: inline-flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 3px; }
.seg button { border: none; background: transparent; color: var(--text-dim); padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
.seg button.active { background: var(--panel); color: var(--text); box-shadow: var(--shadow-sm); }

/* ===================== Progress / bars ===================== */
.bar { height: 9px; border-radius: 999px; background: var(--bg-2); overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #ffffff)); }
.bar.gold > i { background: linear-gradient(90deg, var(--accent-3), #ffe79a); }
.bar.blue > i { background: linear-gradient(90deg, var(--accent-2), #74b6ff); }
.bar.danger > i { background: linear-gradient(90deg, var(--danger), #ff97a9); }
.obj-row { display:flex; align-items:center; gap:12px; padding: 10px 0; border-bottom: 1px dashed var(--line); }
.obj-row:last-child { border-bottom: none; }
.obj-row .obj-meta { flex:1; min-width:0; }
.obj-row .obj-meta b { font-size: 14px; font-weight: 600; }
.obj-row .obj-meta .bar { margin-top: 7px; }

/* ===================== Lists ===================== */
.list { display: flex; flex-direction: column; }
.list-row { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--line); }
.list-row:last-child { border-bottom: none; }
.list-row .lr-main { flex: 1; min-width: 0; }
.list-row .lr-main b { font-size: 14px; display:block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row .lr-main small { color: var(--text-dim); font-size: 12px; }
.avatar { width: 34px; height: 34px; border-radius: 9px; flex:none; display:grid; place-items:center; font-weight:700; font-size:13px; color:#fff; background: var(--panel-2); }

.fixture { display:flex; align-items:center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.fixture:last-child { border-bottom: none; }
.fixture .fx-comp { font-size: 11px; color: var(--text-dim); width: 64px; flex:none; }
.fixture .fx-teams { flex: 1; display:flex; align-items:center; gap: 8px; min-width:0; }
.fixture .fx-teams .t { flex:1; min-width:0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fixture .fx-teams .t.away { text-align: right; }
.fixture .fx-score { font-weight: 800; font-variant-numeric: tabular-nums; padding: 3px 9px; border-radius: 8px; background: var(--bg-2); border:1px solid var(--line); min-width: 48px; text-align:center; }
.fixture .fx-score.win { color: var(--ok); } .fixture .fx-score.loss { color: var(--danger); }

/* ===================== Empty states ===================== */
.empty { text-align: center; padding: 46px 20px; color: var(--text-dim); }
.empty .emoji { font-size: 40px; margin-bottom: 10px; }
.empty h3 { color: var(--text); margin: 0 0 6px; }

/* ===================== Hero (onboarding) ===================== */
.hero { min-height: 100vh; display:grid; place-items:center; padding: 30px 18px; }
.hero-card { max-width: 560px; width: 100%; }
.hero-logo { display:flex; align-items:center; gap:14px; justify-content:center; margin-bottom: 18px; }
.hero-logo .brand-mark { width: 54px; height: 54px; font-size: 20px; border-radius: 15px; }
.hero h1 { text-align: center; font-size: 30px; margin: 0 0 6px; letter-spacing: -.6px; }
.hero p.lead { text-align:center; color: var(--text-dim); margin: 0 0 26px; }

/* ===================== Modal ===================== */
.modal-overlay { position: fixed; inset: 0; background: rgba(4,8,12,.62); backdrop-filter: blur(4px); display: grid; place-items: center; padding: 18px; z-index: 100; }
.modal { background: var(--panel); border: 1px solid var(--line-strong); border-radius: var(--radius-lg); width: min(620px, 100%); max-height: 90vh; overflow: auto; box-shadow: var(--shadow); }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding: 18px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 2; }
.modal-head h2 { margin: 0; font-size: 18px; }
.modal-body { padding: 20px; }
.modal-foot { padding: 16px 20px; border-top: 1px solid var(--line); display:flex; gap: 10px; justify-content: flex-end; position: sticky; bottom: 0; background: var(--panel); }
.modal.lg { width: min(860px, 100%); }

/* ===================== Toasts ===================== */
.toast-stack { position: fixed; right: 18px; bottom: 18px; display:flex; flex-direction: column; gap: 10px; z-index: 200; }
.toast { display:flex; align-items:center; gap: 10px; padding: 12px 16px; border-radius: 12px; background: var(--panel); border: 1px solid var(--line-strong); box-shadow: var(--shadow); font-size: 14px; animation: toastIn .25s ease; max-width: 360px; }
.toast.ok { border-color: color-mix(in srgb, var(--ok) 50%, transparent); }
.toast.err { border-color: color-mix(in srgb, var(--danger) 50%, transparent); }
.toast .ni-icon { color: var(--accent); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity:1; transform: none; } }

/* ===================== Achievements / challenges ===================== */
.ach-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; }
.ach { text-align:center; padding: 16px 12px; border-radius: var(--radius); border:1px solid var(--line); background: var(--panel-2); position: relative; }
.ach.locked { opacity: .5; filter: grayscale(.6); }
.ach .ach-medal { font-size: 30px; }
.ach .ach-name { font-weight: 700; font-size: 13px; margin-top: 6px; }
.ach .ach-desc { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.tier-bronze { color: #cd8c52; } .tier-silver { color: #cfd8e3; } .tier-gold { color: var(--accent-3); } .tier-legend { color: #b06bff; }

.challenge-card { border:1px solid var(--line); border-radius: var(--radius); padding: 16px; background: var(--panel-2); display:flex; flex-direction: column; gap: 10px; }
.challenge-card .cc-top { display:flex; align-items:center; gap: 12px; }
.challenge-card .cc-emoji { font-size: 26px; }
.challenge-card .cc-rules { display:flex; flex-wrap: wrap; gap: 6px; }
.difficulty { display:inline-flex; gap:2px; }
.difficulty i { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); }
.difficulty i.on { background: var(--accent); }

.purity { display:flex; align-items:center; gap: 14px; padding: 16px; border-radius: var(--radius); background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 14%, var(--panel)), var(--panel)); border:1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
.purity .p-num { font-size: 38px; font-weight: 800; line-height: 1; }

/* ===================== Misc ===================== */
.divider { height: 1px; background: var(--line); margin: 18px 0; border: none; }
.row-actions { display:flex; gap: 8px; }
.tag-input { display:flex; flex-wrap: wrap; gap: 6px; }
.flex { display: flex; } .between { justify-content: space-between; } .center { align-items: center; } .gap { gap: 10px; } .wrap { flex-wrap: wrap; }
.spacer { flex: 1; }
.scroll-x { overflow-x: auto; }
.mt { margin-top: 14px; } .mb { margin-bottom: 14px; }
.text-c { text-align: center; }
.sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }

/* ===================== Responsive ===================== */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
    transform: translateX(-105%); transition: transform .22s ease; box-shadow: var(--shadow);
  }
  body.nav-open .sidebar { transform: none; }
  body.nav-open::after { content:""; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 35; }
  .topbar {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    position: sticky; top: 0; z-index: 30; background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
  }
  .topbar-title { font-weight: 700; font-size: 16px; flex: 1; }
  .content { padding: 18px 14px 90px; }

      desc: "No puedes incorporar a nadie de fuera. Solo cantera y agentes libres prohibidos.",

        return inSignings(career)

    "youth-only": {
      label: "Solo cantera",
      desc: "Toda incorporación debe salir de tu academia juvenil.",
      check(career) {
        return inSignings(career)
          .filter(t => t.type !== "youth")
          .map(t => ({ text: `${t.player} no proviene de la cantera` }));
      },
    },
    "free-agents-only": {
      label: "Solo agentes libres",
      desc: "Solo puedes incorporar agentes libres (ni traspasos ni cesiones).",
      check(career) {
        return inSignings(career)
          .filter(t => t.type !== "youth" && t.type !== "free")

      label: "Sin cesiones",
      desc: "No puedes traer jugadores cedidos.",

          .filter(t => t.type === "loan")

      },

    "one-nationality": {
      label: "Una sola nacionalidad",
      desc: "Toda tu plantilla debe compartir la nacionalidad indicada.",
      params: [{ key: "nationality", label: "Nacionalidad permitida", type: "text", placeholder: "p.ej. España" }],
      check(career, p) {
        if (!p || !p.nationality) return [];
        const want = p.nationality.trim().toLowerCase();
        return (career.players || [])
          .filter(pl => (pl.nationality || "").trim().toLowerCase() !== want)
          .map(pl => ({ text: pl.nationality ? `${pl.name} es de ${pl.nationality}, no ${p.nationality}` : `${pl.name} no tiene nacionalidad asignada` }));
      },
    },

      label: "Tope de gasto",
      desc: "Tu gasto total en fichajes no puede superar el límite.",
      params: [{ key: "amount", label: "Gasto máximo (€)", type: "number", placeholder: "p.ej. 50000000" }],
      check(career, p) {
        if (!p || !p.amount) return [];
        const total = inSignings(career).reduce((s, t) => s + (Number(t.fee) || 0), 0);
        const max = Number(p.amount);
        return total > max ? [{ text: `Gasto total ${FC.util.money(total)} supera el tope ${FC.util.money(max)}` }] : [];
      },
    },
    "sell-before-buy": {
      label: "Vende antes de comprar",
      desc: "No puedes gastar más de lo que ingresas por ventas.",
      check(career) {
        const inFees = inSignings(career).reduce((s, t) => s + (Number(t.fee) || 0), 0);
        const outFees = (career.transfers || []).filter(t => t.direction === "out").reduce((s, t) => s + (Number(t.fee) || 0), 0);
        return inFees > outFees
          ? [{ text: `Gastado ${FC.util.money(inFees)} vs ingresado ${FC.util.money(outFees)} (saldo negativo)` }]
          : [];
      },
    },

      label: "Solo jóvenes",
      desc: "No puedes tener jugadores por encima de la edad indicada.",
      params: [{ key: "age", label: "Edad máxima", type: "number", placeholder: "p.ej. 23" }],

        const max = Number(p.age);
        return (career.players || [])

        p.ovrHistory.push({ year: prev.startYear, label: prev.label, ovr, age: Number(p.age) || null });
    });
    const startYear = (prev ? prev.startYear + 1 : new Date().getFullYear());
    const s = {
      id: U.uid(),
      label: data && data.label || (startYear + "/" + String(startYear + 1).slice(-2)),
      startYear,
      leagueId: data && data.leagueId || (prev && prev.leagueId),
      leagueName: data && data.leagueName || (prev && prev.leagueName),
      teams: (data && data.teams) || (prev ? prev.teams.slice() : []),
      status: "active", position: null, boardObjectives: [], note: "", transferBudget: 0,
    };
    (c.seasons || (c.seasons = [])).forEach(x => x.status = "finished");
    c.seasons.push(s);
    c.currentSeasonId = s.id;
    emit();
    return s;
  };

  // ---- collections CRUD ----
  function pushTo(c, key, obj) { (c[key] || (c[key] = [])).push(obj); }
  S.addMatch = (c, m) => { m.id = m.id || U.uid(); pushTo(c, "matches", m); S.afterChange(c); };
  S.updateMatch = (c, id, patch) => { const m = (c.matches || []).find(x => x.id === id); if (m) Object.assign(m, patch); S.afterChange(c); };
  S.deleteMatch = (c, id) => { c.matches = (c.matches || []).filter(x => x.id !== id); S.afterChange(c); };

  // Medias/totales de stats avanzadas de la temporada (solo partidos con m.stats; null si no hay).
  // stats está centrado en tu equipo: { possession:%, shots:[tú,rival], sot, xg, corners, fouls, yellow, red, pens }.
  S.statsAverages = (c, seasonId) => {
    const ms = S.userMatches(c, seasonId).filter(m => m && m.stats);
    if (!ms.length) return null;
    const r1 = (x) => Math.round(x * 10) / 10;
    const out = { count: ms.length };
    const possVals = ms.map(m => m.stats.possession).filter(v => typeof v === "number" && isFinite(v));
    if (possVals.length) { const avg = possVals.reduce((s, x) => s + x, 0) / possVals.length; out.possession = { f: r1(avg), a: r1(100 - avg) }; }
    const aggPair = (key, mode) => {
      const rows = ms.map(m => m.stats[key]).filter(p => Array.isArray(p));
      if (!rows.length) return null;
      const f = rows.reduce((s, p) => s + (Number(p[0]) || 0), 0);
      const a = rows.reduce((s, p) => s + (Number(p[1]) || 0), 0);
      return mode === "avg" ? { f: r1(f / rows.length), a: r1(a / rows.length) } : { f: r1(f), a: r1(a) };
    };
    ["shots", "sot", "xg", "corners", "fouls"].forEach(k => { const v = aggPair(k, "avg"); if (v) out[k] = v; });
    ["yellow", "red", "pens"].forEach(k => { const v = aggPair(k, "sum"); if (v) out[k] = v; });
    return out;
  };

  // Parser CSV minimal: soporta campos entrecomillados ("" escapa comilla), comas
  // internas, y saltos \n/\r\n. Devuelve filas (arrays de celdas), sin filas vacías.
  function parseCSV(text) {
    text = String(text == null ? "" : text).replace(/^﻿/, "");
    const rows = []; let row = [], field = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inQ) {
        if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
        else field += ch;
      } else if (ch === '"') inQ = true;
      else if (ch === ",") { row.push(field); field = ""; }
      else if (ch === "\n" || ch === "\r") { if (ch === "\r" && text[i + 1] === "\n") i++; row.push(field); rows.push(row); row = []; field = ""; }
      else field += ch;
    }
    if (field !== "" || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.length && r.some(x => String(x).trim() !== ""));
  }
  // Importa partidos desde CSV a una temporada. Añade en bloque (un solo afterChange).
  S.importMatchesCSV = (c, text, seasonId) => {
    const rows = parseCSV(text);
    if (rows.length < 2) return { added: 0, skipped: 0, total: 0, error: "Necesito una cabecera y al menos una fila." };
    const norm = (s) => String(s || "").trim().toLowerCase();
    const header = rows[0].map(norm);
    const idx = (names) => { for (const n of names) { const i = header.indexOf(n); if (i >= 0) return i; } return -1; };
    const col = {
      date: idx(["fecha", "date"]),
      comp: idx(["competicion", "competición", "competition", "comp"]),
      round: idx(["ronda", "round", "jornada"]),
      venue: idx(["condicion", "condición", "venue", "local", "localidad"]),
      rival: idx(["rival", "oponente", "opponent", "contrincante"]),
      gf: idx(["gf", "golesfavor", "goles_favor", "goles a favor", "favor"]),
      ga: idx(["ga", "golescontra", "goles_contra", "goles en contra", "contra"]),
    };
    if (col.rival < 0 || col.gf < 0 || col.ga < 0) return { added: 0, skipped: 0, total: rows.length - 1, error: "Faltan columnas obligatorias: rival, gf, ga." };
    const season = S.getSeason(c, seasonId) || S.currentSeason(c);
    const sid = season ? season.id : seasonId;
    const T = c.clubName, cell = (r, i) => (i >= 0 && i < r.length) ? String(r[i]).trim() : "";
    let added = 0, skipped = 0;
    for (let k = 1; k < rows.length; k++) {
      const r = rows[k];
      const rival = cell(r, col.rival), gfRaw = cell(r, col.gf), gaRaw = cell(r, col.ga);
      const gf = Number(gfRaw), ga = Number(gaRaw);
      if (!rival || rival.toLowerCase() === String(T).toLowerCase() || gfRaw === "" || gaRaw === "" || !Number.isInteger(gf) || !Number.isInteger(ga) || gf < 0 || ga < 0) { skipped++; continue; }
      const v = norm(cell(r, col.venue));
      const isHome = !(v === "visitante" || v === "away" || v === "v" || v === "fuera"); // default local
      pushTo(c, "matches", {
        id: U.uid(), seasonId: sid, competition: cell(r, col.comp) || "Liga", round: cell(r, col.round), date: cell(r, col.date),
        home: isHome ? T : rival, away: isHome ? rival : T, homeScore: isHome ? gf : ga, awayScore: isHome ? ga : gf, events: [],
      });
      added++;
    }
    if (added) S.afterChange(c);
    return { added, skipped, total: rows.length - 1 };
  };

  S.addPlayer = (c, p) => { p.id = p.id || U.uid(); pushTo(c, "players", p); if (p._signing) S.addTransfer(c, p._signing, true); emit(); };
  S.updatePlayer = (c, id, patch) => { const p = c.players.find(x => x.id === id); if (p) Object.assign(p, patch); emit(); };
  S.deletePlayer = (c, id) => { c.players = c.players.filter(x => x.id !== id); emit(); };

  S.addTransfer = (c, t, silent) => { t.id = t.id || U.uid(); pushTo(c, "transfers", t); if (!silent) S.afterChange(c); };
  S.updateTransfer = (c, id, patch) => { const t = (c.transfers || []).find(x => x.id === id); if (t) Object.assign(t, patch); S.afterChange(c); };
  S.deleteTransfer = (c, id) => { c.transfers = (c.transfers || []).filter(x => x.id !== id); S.afterChange(c); };

  S.addTrophy = (c, t) => { t.id = t.id || U.uid(); pushTo(c, "trophies", t); S.afterChange(c); };
  S.deleteTrophy = (c, id) => { c.trophies = c.trophies.filter(x => x.id !== id); S.afterChange(c); };
  S.addAward = (c, a) => { a.id = a.id || U.uid(); pushTo(c, "awards", a); emit(); };
  S.deleteAward = (c, id) => { c.awards = c.awards.filter(x => x.id !== id); emit(); };

  S.addNote = (c, n) => { n.id = n.id || U.uid(); pushTo(c, "notes", n); emit(); };
  S.deleteNote = (c, id) => { c.notes = c.notes.filter(x => x.id !== id); emit(); };

  S.addChallenge = (c, ch) => { ch.id = ch.id || U.uid(); pushTo(c, "challenges", ch); emit(); };
  S.updateChallenge = (c, id, patch) => { const ch = c.challenges.find(x => x.id === id); if (ch) Object.assign(ch, patch); emit(); };
  S.deleteChallenge = (c, id) => { c.challenges = c.challenges.filter(x => x.id !== id); emit(); };

  // called after data that affects achievements/standings changes
  S.afterChange = (c) => { S.evaluateAchievements(c); emit(); };

  /* ---------- DERIVACIONES ---------- */
  S.isUserMatch = (c, m) => m.home === c.clubName || m.away === c.clubName;
  S.userGoals = (c, m) => {
    if (m.home === c.clubName) return { for: Number(m.homeScore), against: Number(m.awayScore) };
    if (m.away === c.clubName) return { for: Number(m.awayScore), against: Number(m.homeScore) };
    return null;
  };
  S.userResult = (c, m) => {
    const g = S.userGoals(c, m); if (!g) return null;
    return g.for > g.against ? "W" : g.for < g.against ? "L" : "D";
  };
  S.userMatches = (c, seasonId) => (c.matches || [])
    .filter(m => S.isUserMatch(c, m) && (!seasonId || m.seasonId === seasonId));
  S.anyMatch = (c, fn) => S.userMatches(c).some(m => fn(m));

  S.computeStandings = (c, seasonId) => {
    const league = (c.matches || []).filter(m => m.seasonId === seasonId && /liga/i.test(m.competition || ""));
    const season = S.getSeason(c, seasonId);
    const tbl = {};
    const ensure = (name) => (tbl[name] || (tbl[name] = { team: name, pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 }));
    (season && season.teams || []).forEach(ensure);
    league.forEach(m => {
      const hs = Number(m.homeScore), as = Number(m.awayScore);
      if (m.home == null || m.away == null || isNaN(hs) || isNaN(as)) return;
      const H = ensure(m.home), A = ensure(m.away);
      H.pj++; A.pj++; H.gf += hs; H.gc += as; A.gf += as; A.gc += hs;
      if (hs > as) { H.pg++; A.pp++; H.pts += 3; }
      else if (hs < as) { A.pg++; H.pp++; A.pts += 3; }
      else { H.pe++; A.pe++; H.pts++; A.pts++; }
    });
    return Object.values(tbl).sort((a, b) =>
      b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf || a.team.localeCompare(b.team));
  };
  S.userPosition = (c, seasonId) => {
    const t = S.computeStandings(c, seasonId);
    const i = t.findIndex(r => r.team === c.clubName);
    return i >= 0 ? { pos: i + 1, total: t.length } : null;
  };

  S.seasonSummary = (c, season) => {
    const sid = season.id;
    const ms = S.userMatches(c, sid);
    let w=0,d=0,l=0,gf=0,ga=0,cs=0;
    ms.forEach(m => { const g = S.userGoals(c, m); const r = S.userResult(c, m);
      if (!g) return; gf += g.for; ga += g.against; if (g.against === 0) cs++;
      if (r === "W") w++; else if (r === "D") d++; else l++; });
    const league = ms.filter(m => /liga/i.test(m.competition || ""));
    let lw=0,ld=0,ll=0;
    league.forEach(m => { const r = S.userResult(c, m); if (r==="W") lw++; else if (r==="D") ld++; else ll++; });
    const trophies = (c.trophies || []).filter(t => t.seasonId === sid && t.result === "winner");
    const wonLeague = trophies.some(t => /liga/i.test(t.competition || ""));
    const wonCup = trophies.some(t => /copa/i.test(t.competition || ""));
    const wonContinental = trophies.some(t => FC.data.CONTINENTAL.some(cc => (t.competition || "").includes(cc)));
    const played = w+d+l;
    return {
      season, played, w, d, l, gf, ga, gd: gf - ga, cleanSheets: cs,
      points: w*3+d, winPct: played ? Math.round((w/played)*100) : 0,
      leaguePlayed: league.length, leagueLost: ll, leagueWon: lw, leagueDrawn: ld,
      wonLeague, wonCup, wonContinental,
      trophies: trophies.length,
    };
  };
  S.seasonsSome = (c, fn) => (c.seasons || []).some(s => fn(S.seasonSummary(c, s)));

  // Resumen financiero de UNA temporada, derivado siempre de c.transfers (nunca
  // se persiste). Usa el mismo criterio de fee (Number||0) que el motor de retos,
  // así la vista y las reglas comparten una única fuente de verdad.
  S.financeSummary = (c, seasonId) => {
    const s = S.getSeason(c, seasonId) || {};
    const fee = (t) => Number(t.fee) || 0;
    const byDate = (a, b) => new Date(a.date || 0) - new Date(b.date || 0);
    const ts = (c.transfers || []).filter(t => t.seasonId === seasonId);
    const ins = ts.filter(t => t.direction === "in").sort(byDate);
    const outs = ts.filter(t => t.direction === "out").sort(byDate);
    const budget = Number(s.transferBudget) || 0;
    const spent = ins.reduce((a, t) => a + fee(t), 0);
    const earned = outs.reduce((a, t) => a + fee(t), 0);
    const hasBudget = budget > 0;
    const top = (arr) => arr.reduce((best, t) => (!best || fee(t) > fee(best) ? t : best), null);
    return {
      budget, spent, earned, net: earned - spent,
      remaining: hasBudget ? (budget - spent + earned) : null,
      pct: hasBudget ? U.clamp(Math.round((spent - earned) / budget * 100), 0, 100) : 0,
      hasBudget, ins, outs, inCount: ins.length, outCount: outs.length,
      topBuy: top(ins), topSale: top(outs),
    };
  };
  S.setTransferBudget = (c, seasonId, amount) => {
    const s = S.getSeason(c, seasonId);
    if (s) s.transferBudget = Math.max(0, Number(amount) || 0);
    emit();
  };

  // Serie de OVR de un jugador: histórico de temporadas cerradas + punto "actual"
  // (OVR vivo de la temporada en curso). Devuelve [{label, year, ovr, age, current?}].
  S.playerSeries = (c, player) => {
    const hist = ((player && player.ovrHistory) || []).slice()
      .map(h => ({ label: h.label, year: Number(h.year), ovr: Number(h.ovr), age: h.age != null ? Number(h.age) : null }))
      .filter(p => Number.isFinite(p.ovr))
      .sort((a, b) => a.year - b.year);
    const cur = S.currentSeason(c);
    const ovrNow = Number(player && player.ovr);
    if (cur && Number.isFinite(ovrNow) && !hist.some(h => h.year === cur.startYear))
      hist.push({ label: cur.label, year: cur.startYear, ovr: ovrNow, age: player.age != null ? Number(player.age) : null, current: true });
    return hist;
  };

  /* ---------- ACADEMIA JUVENIL ---------- */
  S.generateYouthIntake = (c, n) => {
    n = n || 3;
    const Y = FC.data;
    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const cur = S.currentSeason(c);
    const made = [];
    for (let i = 0; i < n; i++) {
      const ovr = 50 + Math.floor(Math.random() * 17);                                  // 50-66
      const potential = U.clamp(ovr + 6 + Math.floor(Math.random() * 22), ovr + 5, 93); // > ovr, tope 93
      const tier = potential >= 88 ? "elite" : potential >= 82 ? "high" : potential >= 74 ? "mid" : "low";
      const y = {
        id: U.uid(),
        name: pick(Y.YOUTH_FIRST) + " " + pick(Y.YOUTH_LAST),
        position: pick(Y.POSITIONS),
        age: 15 + Math.floor(Math.random() * 4),                                         // 15-18
        ovr, potential,
        nationality: pick(Y.YOUTH_NATIONS),
        scoutNote: pick(Y.YOUTH_NOTES[tier]),
        year: cur ? cur.startYear : null,
        seasonLabel: cur ? cur.label : "",
        status: "academy",
      };
      (c.youth || (c.youth = [])).push(y);
      made.push(y);
    }
    emit();
    return made;
  };
  S.promoteYouth = (c, id) => {
    const y = (c.youth || []).find(x => x.id === id);
    if (!y || y.status !== "academy") return null;                  // idempotente
    y.status = "promoted";                                          // marca ANTES de crear: cierra la ventana de doble clic (re-render es async/rAF)
    const np = { name: y.name, position: y.position, age: y.age, nationality: y.nationality,
      ovr: y.ovr, potential: y.potential, fromYouth: true, ovrHistory: [], squadRole: "Promesa" };
    S.addPlayer(c, np);                                             // muta np.id
    y.promotedPlayerId = np.id;
    S.afterChange(c);                                              // reevalúa logros de cantera
    return np;
  };
  S.releaseYouth = (c, id) => { c.youth = (c.youth || []).filter(x => x.id !== id); emit(); };

  /* ---------- NARRATIVA / STORYLINE ---------- */
  // Frase resumen de la temporada (texto plano; la vista lo escapa con U.esc).
  S.seasonRecap = (c, season) => {
    if (!season) return "";
    const sum = S.seasonSummary(c, season);
    if (!sum.played) return `${c.clubName} aún no ha jugado en ${season.label}. La historia está por escribir.`;
    const pos = S.userPosition(c, season.id);
    let s = `${c.clubName} disputó ${sum.played} partidos en ${season.label}: ${sum.w}V ${sum.d}E ${sum.l}D, con ${sum.gf} goles a favor y ${sum.ga} en contra`;
    if (pos) s += `. Acabó ${pos.pos}º de ${pos.total} en la liga`;
    if (sum.trophies > 0) s += `, levantando ${sum.trophies} ${sum.trophies === 1 ? "título" : "títulos"}`;
    s += ".";
    if (sum.wonLeague) s += " ¡Campeones de Liga!";
    else if (sum.winPct >= 70) s += " Una temporada soberbia.";
    else if (sum.winPct < 35) s += " Un curso para olvidar.";
    return s;
  };
  // Feed de titulares DERIVADO de los datos (no persiste nada). title/sub salen
  // ya escapados (HTML-safe): phrase() escapa cada variable y los sub escapan las
  // partes de usuario. La frase se elige de forma DETERMINISTA por hash del id.
  S.storyline = (c, seasonId) => {
    const beats = [];
    const season = S.getSeason(c, seasonId) || S.currentSeason(c);
    if (!season) return beats;
    const sid = season.id, T = c.clubName, esc = U.esc;
    const hash = (s) => { let h = 0; s = String(s || ""); for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 100000; return h; };
    const phrase = (kind, seed, vars) => {
      const pool = (FC.data.STORY && FC.data.STORY[kind]) || ["{team}"];
      return pool[hash(seed) % pool.length].replace(/\{(\w+)\}/g, (_, k) => esc(vars[k] != null ? vars[k] : ""));
    };
    const norm = (s) => String(s == null ? "" : s).trim().toLowerCase();
    const push = (b) => beats.push(b);

    push({ phase: 0, date: 0, tone: "neutral", icon: "book",
      title: phrase("opener", "opener:" + sid, { season: season.label }),
      sub: esc(c.leagueName || season.leagueName || "") });

    const ms = S.userMatches(c, sid);
    ms.forEach(m => {
      const g = S.userGoals(c, m); if (!g) return;
      const diff = g.for - g.against;
      const rival = m.home === T ? m.away : m.home;
      const date = m.date ? new Date(m.date).getTime() : 0;
      const scoreline = `${esc(m.home)} ${Number(m.homeScore)}-${Number(m.awayScore)} ${esc(m.away)}`;
      if (diff >= 3) push({ phase: 1, date, tone: "good", icon: "flame",
        title: phrase("bigWin", "bw:" + m.id, { team: T, rival, gf: g.for, ga: g.against }),
        sub: (m.competition ? esc(m.competition) + " · " : "") + scoreline });
      else if (diff <= -3) push({ phase: 1, date, tone: "bad", icon: "flag",
        title: phrase("bigLoss", "bl:" + m.id, { team: T, rival }),
        sub: (m.competition ? esc(m.competition) + " · " : "") + scoreline });
      const tally = {};
      (m.events || []).forEach(ev => { if (ev.type === "goal" && norm(ev.player)) { const k = norm(ev.player); (tally[k] || (tally[k] = { n: 0, name: ev.player })).n++; } });
      Object.keys(tally).forEach(k => { if (tally[k].n >= 3) push({ phase: 1, date, tone: "good", icon: "star",
        title: phrase("hattrick", "ht:" + m.id + ":" + k, { player: tally[k].name }),
        sub: `${tally[k].n} goles · vs ${esc(rival)}` }); });
    });

    (c.transfers || []).filter(t => t.seasonId === sid).forEach(t => {
      const fee = Number(t.fee) || 0;
      const date = t.date ? new Date(t.date).getTime() : 0;
      const phase = t.date ? 1 : 0;
      if (t.direction === "in") push({ phase, date, tone: "good", icon: "swap",
        title: phrase(fee >= 30000000 ? "signMarquee" : "signIn", "tin:" + t.id, { team: T, player: t.player, fee: U.money(fee) }),
        sub: (t.club ? "de " + esc(t.club) + " · " : "") + (fee > 0 ? U.money(fee) : "agente libre") });
      else push({ phase, date, tone: "neutral", icon: "swap",
        title: phrase("saleOut", "tout:" + t.id, { player: t.player, club: t.club || "otro club" }),
        sub: (t.club ? "al " + esc(t.club) + " · " : "") + (fee > 0 ? U.money(fee) : "sin coste") });
    });

    (c.youth || []).filter(y => y.status === "promoted" && y.year === season.startYear).forEach(y => {
      push({ phase: 0, date: 0, tone: "good", icon: "sprout",
        title: phrase("youth", "y:" + y.id, { player: y.name }),
        sub: "Cantera · " + esc(y.position || "") });
    });

    const ordered = ms.slice().sort((a, b) => (a.date ? new Date(a.date).getTime() : 0) - (b.date ? new Date(b.date).getTime() : 0));
    let run = 0, best = 0;
    ordered.forEach(m => { const r = S.userResult(c, m); if (r === "L") run = 0; else if (r) { run++; best = Math.max(best, run); } });
    if (best >= 5) push({ phase: 8, date: 0, tone: "good", icon: "flame",
      title: phrase("streak", "streak:" + sid, { team: T, n: best }), sub: "Racha de la temporada" });

    (c.trophies || []).filter(t => t.seasonId === sid).forEach(t => {
      const kind = t.result === "winner" ? "trophyWin" : t.result === "promotion" ? "promotion" : "runnerup";
      push({ phase: 9, date: 0, tone: t.result === "runnerup" ? "neutral" : "good", icon: "trophy",
        title: phrase(kind, "tr:" + t.id, { team: T, comp: t.competition }), sub: esc(t.competition || "") });
    });

    beats.sort((a, b) => (a.phase - b.phase) || (a.date - b.date));
    return beats;
  };

  /* ---------- GENERADOR VIRAL (roll aleatorio, NO usar en render) ---------- */
  S.rollChallenge = (opts) => {
    opts = opts || {};
    const D = FC.data;
    const rnd = (a) => a[Math.floor(Math.random() * a.length)];
    const leagues = D.LEAGUES.filter(l => (l.teams || []).length);
    let league = opts.leagueId ? D.LEAGUES.find(l => l.id === opts.leagueId) : null;
    if (!league || !(league.teams || []).length) league = rnd(leagues);
    const club = rnd(league.teams);
    const mode = opts.mode === "rebuild" ? "rebuild" : "random";
    const twists = [];
    const addTwist = (t) => { if (t && !twists.some(x => x.label === t.label)) twists.push({ label: t.label, emoji: t.emoji, ruleId: t.ruleId || null, params: Object.assign({}, t.params || {}) }); };
    if (mode === "rebuild") addTwist(rnd(D.GEN_TWISTS.filter(t => t.ruleId === "youth-only" || t.ruleId === "max-age")));
    const target = mode === "rebuild" ? 2 : 1 + Math.floor(Math.random() * 2);
    let guard = 0;
    while (twists.length < target && guard++ < 30) addTwist(rnd(D.GEN_TWISTS));
    twists.forEach(t => { if (t.ruleId === "one-nationality") t.params.nationality = rnd(D.YOUTH_NATIONS); });
    const objective = mode === "rebuild" ? rnd(D.GEN_OBJECTIVES.filter(o => o.diff >= 3)) : rnd(D.GEN_OBJECTIVES);
    const seasons = (mode === "rebuild" ? 4 : 2) + Math.floor(Math.random() * 5);
    const difficulty = U.clamp(Math.round(objective.diff + twists.length * 0.8), 1, 5);
    return { mode, club, league: league.name, leagueId: league.id, objective, twists, seasons, difficulty };
  };

  /* ---------- SALÓN DE LA FAMA (agregado entre TODAS las carreras) ---------- */
  S.hallOfFame = () => {
    const careers = S.careersList();
    const totals = { careers: careers.length, seasons: 0, matches: 0, trophies: 0 };
    let bestSeason = null, scorer = null, assister = null, apps = null;
    const list = [];
    careers.forEach(c => {
      totals.seasons += (c.seasons || []).length;
      totals.matches += (c.matches || []).length;
      totals.trophies += (c.trophies || []).length;
      const titles = (c.trophies || []).filter(t => t.result === "winner").length;
      list.push({ id: c.id, clubName: c.clubName, leagueName: c.leagueName, badgeColor: c.badgeColor, seasons: (c.seasons || []).length, trophies: (c.trophies || []).length, titles });
      (c.seasons || []).forEach(s => {
        const sum = S.seasonSummary(c, s);
        if (sum.played && (!bestSeason || sum.points > bestSeason.points))
          bestSeason = { club: c.clubName, label: s.label, points: sum.points, w: sum.w, d: sum.d, l: sum.l, gf: sum.gf, ga: sum.ga };
      });
      Object.values(S.playerAggregates(c, null)).forEach(p => {
        if (p.goals && (!scorer || p.goals > scorer.value)) scorer = { name: p.name, value: p.goals, club: c.clubName };
        if (p.assists && (!assister || p.assists > assister.value)) assister = { name: p.name, value: p.assists, club: c.clubName };
        if (p.apps && (!apps || p.apps > apps.value)) apps = { name: p.name, value: p.apps, club: c.clubName };
      });
    });
    list.sort((a, b) => b.titles - a.titles || b.trophies - a.trophies || b.seasons - a.seasons);
    return { totals, bestSeason, legends: { scorer, assister, apps }, careers: list };
  };

  // player aggregates; seasonId null => all-time (career)
  S.playerAggregates = (c, seasonId) => {
    const map = {};
    const ms = S.userMatches(c, seasonId);
    // Clave canónica por NOMBRE normalizado (no por playerId): un mismo jugador
    // puede aparecer con id en unos eventos y solo por nombre en otros. Si se
    // agrupara por id se partiría en dos entradas, repartiendo sus partidos y
    // goles y bloqueando logros como Centurión (100 partidos) o Bota de oro.
    const norm = (s) => String(s == null ? "" : s).trim().toLowerCase();
    const keyOf = (name, id) => norm(name) || ("id:" + (id || "?"));
    const ensure = (k, name, id) => {
      if (!map[k]) map[k] = { playerId: id || null, name: name || "?", apps:0, goals:0, assists:0, motm:0, yellows:0, reds:0, ratingSum:0, ratingN:0, minutes:0 };
      else if (id && !map[k].playerId) map[k].playerId = id;
      return map[k];
    };
    ms.forEach(m => {
      const seen = {};
      (m.events || []).forEach(ev => {
        const k = keyOf(ev.player, ev.playerId);
        const a = ensure(k, ev.player, ev.playerId);
        if (ev.type === "goal") a.goals++;
        else if (ev.type === "assist") a.assists++;
        else if (ev.type === "yellow") a.yellows++;
        else if (ev.type === "red") a.reds++;
        seen[k] = true;
      });
      (m.ratings || []).forEach(rt => {
        const k = keyOf(rt.name, rt.playerId);
        const a = ensure(k, rt.name, rt.playerId);
        if (rt.rating) { a.ratingSum += Number(rt.rating); a.ratingN++; }
        if (rt.minutes) a.minutes += Number(rt.minutes);
        seen[k] = true;
      });
      if (m.motm) { const k = keyOf(m.motm, m.motmId); ensure(k, m.motm, m.motmId).motm++; seen[k] = true; }
      Object.keys(seen).forEach(k => { if (map[k]) map[k].apps++; });
    });
    Object.values(map).forEach(a => a.avg = a.ratingN ? (a.ratingSum / a.ratingN) : 0);
    return map;
  };
  S.anyPlayerSeason = (c, fn) => (c.seasons || []).some(s => Object.values(S.playerAggregates(c, s.id)).some(fn));
  S.anyPlayerCareer = (c, fn) => Object.values(S.playerAggregates(c, null)).some(fn);

  S.consecutiveLeagueTitles = (c) => {
    const seasons = (c.seasons || []).slice().sort(U.by("startYear"));
    let best=0, cur=0;
    seasons.forEach(s => { if (S.seasonSummary(c, s).wonLeague) { cur++; best = Math.max(best, cur); } else cur = 0; });
    return best;
  };

  S.allTimeRecords = (c) => {
    const agg = S.playerAggregates(c, null);
    const players = Object.values(agg);
    const topScorer = players.slice().sort((a,b) => b.goals - a.goals)[0];
    const topAssister = players.slice().sort((a,b) => b.assists - a.assists)[0];
    const topApps = players.slice().sort((a,b) => b.apps - a.apps)[0];
    let bestWin = null;
    S.userMatches(c).forEach(m => { const g = S.userGoals(c, m); if (!g || g.for <= g.against) return; const diff = g.for - g.against;
      if (!bestWin || diff > bestWin.diff) bestWin = { diff, match: m, g }; });
    // longest unbeaten run
    const ordered = S.userMatches(c).slice().sort((a,b) => new Date(a.date||0) - new Date(b.date||0));
    let run=0, bestRun=0;
    ordered.forEach(m => { const r = S.userResult(c, m); if (r === "L") run = 0; else { run++; bestRun = Math.max(bestRun, run); } });
    return { topScorer, topAssister, topApps, bestWin, bestUnbeaten: bestRun };
  };

  /* ---------- LOGROS ---------- */
  S.evaluateAchievements = (c) => {
    const unlocked = c.achievements || (c.achievements = []);
    const newly = [];
    FC.data.ACHIEVEMENTS.forEach(a => {
      if (unlocked.includes(a.id)) return;
      let ok = false;
      try { ok = !!a.check(c); } catch (e) { ok = false; }
      if (ok) { unlocked.push(a.id); newly.push(a); }
    });
    if (newly.length && FC.app && FC.app.onAchievements) FC.app.onAchievements(newly);
    return newly;
  };

  /* ---------- RETOS / VIOLACIONES ---------- */
  S.ruleViolations = (c, challenge) => {
    const out = [];
    (challenge.rules || []).forEach(r => {
      const def = FC.data.RULES[r.ruleId];
      if (!def || def.manual) return;
      let v = [];
      try { v = def.check(c, r.params || {}) || []; } catch (e) { v = []; }
      v.forEach(x => out.push({ ruleId: r.ruleId, label: def.label, text: x.text }));
    });
    return out;
  };
  S.purityStreak = (c) => {
    // Sin retos activos no hay "pureza" que medir. Con retos activos: si alguno
    // tiene infracciones devuelve 0; si están todos limpios, el total de partidos
    // jugados (todos cuentan como "sin infracciones").
    const active = (c.challenges || []).filter(ch => ch.status === "active");
    if (!active.length) return 0;
    const totalViol = active.reduce((s, ch) => s + S.ruleViolations(c, ch).length, 0);
    if (totalViol > 0) return 0;
    return S.userMatches(c).length;
  };

  FC.store = S;

  /* ============================================================
     ROUTER (hash)
     ============================================================ */
  const R = { routes: {}, current: null };
  R.register = (name, fn) => { R.routes[name] = fn; };
  R.go = (name) => { if (location.hash !== "#" + name) location.hash = "#" + name; else R.render(); };
  R.render = () => {
    const name = (location.hash || "#dashboard").slice(1).split("?")[0] || "dashboard";
    R.current = name;
    const fn = R.routes[name] || R.routes["dashboard"];
    if (fn) fn();
  };
  window.addEventListener("hashchange", R.render);
  FC.router = R;
})();

      if (!opp) { UI.toast("Indica el rival", "err"); return; }
      if (gf === "" || ga === "") { UI.toast("Completa el marcador", "err"); return; }
      const gfN = Number(gf), gaN = Number(ga);
      if (!Number.isFinite(gfN) || !Number.isFinite(gaN) || gfN < 0 || gaN < 0) { UI.toast("El marcador debe ser un número de 0 o más", "err"); return; }
      const home = venue === "home" ? c.clubName : opp;
      const away = venue === "home" ? opp : c.clubName;
      const homeScore = venue === "home" ? gfN : gaN;
      const awayScore = venue === "home" ? gaN : gfN;
      const events = [];
      U.els("#m-scorers .field-row").forEach(row => {
        const ins = row.querySelectorAll("input");
        const sc = ins[0].value.trim(), as = ins[1].value.trim();
        if (sc) { const p = (c.players||[]).find(x => x.name === sc); events.push({ type:"goal", player: sc, playerId: p && p.id }); }
        if (as) { const p = (c.players||[]).find(x => x.name === as); events.push({ type:"assist", player: as, playerId: p && p.id }); }
      });
      const motm = document.getElementById("m-motm").value.trim();
      const motmP = (c.players||[]).find(x => x.name === motm);
      // stats avanzadas (opcional, centradas en tu equipo). Vacío total → no se guarda.
      const num = (id) => { const el = document.getElementById(id); const val = el ? el.value.trim() : ""; if (val === "") return null; const n = Number(val); return (Number.isFinite(n) && n >= 0) ? n : null; };
      const pairOf = (key) => { const f = num("ms-" + key + "-f"), a = num("ms-" + key + "-a"); return (f == null && a == null) ? null : [f == null ? 0 : f, a == null ? 0 : a]; };
      const stats = {};
      const poss = num("ms-poss"); if (poss != null) stats.possession = poss;
      ["shots", "sot", "xg", "corners", "fouls", "yellow", "red", "pens"].forEach(k => { const p = pairOf(k); if (p) stats[k] = p; });
      const data = {
        seasonId: season.id, competition: document.getElementById("m-comp").value,
        round: document.getElementById("m-round").value.trim(),
        date: document.getElementById("m-date").value, home, away, homeScore, awayScore,
        events, motm: motm || "", motmId: motmP && motmP.id,
        stats: Object.keys(stats).length ? stats : undefined,
      };
      if (existing) S.updateMatch(c, existing.id, data); else S.addMatch(c, data);
      UI.closeModal();
      UI.toast(existing ? "Partido actualizado" : "Partido registrado ⚽", "ok");
    });
  };

  function rankCard(title, rows, key, emoji) {
    return `<div class="card"><div class="card-head"><h3>${emoji} ${title}</h3></div>
      ${rows.length ? `<div class="list">${rows.map((p, i) => `<div class="list-row">

  }
  function renderBracket(c) {
    const box = document.getElementById("bracket-card");
    c.bracket = c.bracket || null;
    if (!c.bracket) {
      box.innerHTML = `<p class="muted" style="margin-top:0">Crea un cuadro eliminatorio (copa, torneo ficticio o reto con amigos).</p>
        <div class="field"><label>Equipos (separados por comas) — potencias de 2 ideal (4, 8, 16)</label>
        <textarea id="bk-teams" placeholder="${U.esc((S.currentSeason(c).teams||[]).slice(0,8).join(", "))}"></textarea></div>
        <button class="btn btn-primary" id="bk-make"><span class="ni-icon" data-icon="target"></span> Generar cuadro</button>`;
      U.hydrateIcons(box);
      box.querySelector("#bk-make").addEventListener("click", () => {
        let teams = box.querySelector("#bk-teams").value.split(",").map(s => s.trim()).filter(Boolean);
        if (teams.length < 2) { UI.toast("Añade al menos 2 equipos", "err"); return; }
        // shuffle
        for (let i = teams.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [teams[i], teams[j]] = [teams[j], teams[i]]; }
        let size = 2; while (size < teams.length) size *= 2;
        while (teams.length < size) teams.push("BYE");
        const round = []; for (let i = 0; i < teams.length; i += 2) round.push({ a: teams[i], b: teams[i+1], w: null });
        c.bracket = { rounds: [round] }; S.emit(); renderBracket(c);
      });
      return;
    }
    const b = c.bracket;
    // ensure next rounds exist as winners get set
    const html = b.rounds.map((round, ri) => `
      <div style="min-width:200px">
        <div class="section-title" style="margin:0 0 8px">${roundName(b.rounds.length, ri)}</div>
        ${round.map((tie, ti) => `<div class="card tight" style="margin-bottom:8px;padding:8px">
          ${tieTeam(tie, "a", ri, ti)}${tieTeam(tie, "b", ri, ti)}</div>`).join("")}
      </div>`).join("");
    box.innerHTML = `<div class="flex between center mb"><b>Cuadro</b><button class="btn btn-ghost btn-sm" id="bk-reset"><span class="ni-icon" data-icon="trash"></span> Reiniciar</button></div>
      <div class="scroll-x flex gap" style="align-items:flex-start">${html}</div>`;
    U.hydrateIcons(box);
    box.querySelector("#bk-reset").addEventListener("click", () => { c.bracket = null; S.emit(); renderBracket(c); });
    box.querySelectorAll("[data-pick]").forEach(el => el.addEventListener("click", () => {
      const [ri, ti, side] = el.dataset.pick.split(":");
      const round = b.rounds[+ri]; const tie = round[+ti];
      tie.w = tie[side];
      // build next round if all decided
      if (round.every(t => t.w)) {
        const next = []; for (let i = 0; i < round.length; i += 2) {
          if (round[i+1]) next.push({ a: round[i].w, b: round[i+1].w, w: null });
        }
        b.rounds = b.rounds.slice(0, +ri + 1);
        if (next.length) b.rounds.push(next);
      } else { b.rounds = b.rounds.slice(0, +ri + 1); }
      S.emit(); renderBracket(c);
    }));
  }
  function tieTeam(tie, side, ri, ti) {
    const name = tie[side]; const isW = tie.w && tie.w === name; const bye = name === "BYE";
    return `<div class="flex between center" data-pick="${ri}:${ti}:${side}" style="cursor:${bye?"default":"pointer"};padding:5px 7px;border-radius:7px;${isW?"background:color-mix(in srgb,var(--accent) 16%,transparent)":""}">
      <span style="${bye?"opacity:.4":""}">${U.esc(name||"—")}</span>${isW?'<span class="ni-icon" data-icon="check" style="color:var(--accent)"></span>':""}</div>`;
  }
  function roundName(total, ri) {
    const left = total - ri; if (left === 1) return "Final"; if (left === 2) return "Semifinal"; if (left === 3) return "Cuartos"; if (left === 4) return "Octavos";
    return "Ronda " + (ri + 1);
  }

  // Mini-sparkline SOLO de trazo (sin gradiente ni id) — evita la colisión del
  // id="lg" de CH.line al pintar muchos en una tabla. Recibe array de números.
  function miniSpark(values, opts) {
    opts = opts || {};
    const w = opts.w || 120, h = opts.h || 30, pad = 3;
    const vals = (values || []).filter(v => Number.isFinite(v));
    if (vals.length < 2) return `<span class="faint" style="font-size:12px">—</span>`;
    const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
    const stepX = (w - pad * 2) / (vals.length - 1);
    const pts = vals.map((v, i) => [pad + i * stepX, h - pad - ((v - min) / range) * (h - pad * 2)]);
    const d = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
    const col = opts.color || "var(--accent)";
    const last = pts[pts.length - 1];
    return `<svg viewBox="0 0 ${w} ${h}" style="width:${w}px;height:${h}px;vertical-align:middle">
      <path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.4" fill="${col}"/></svg>`;
  }

  let toolRoll = null, toolLeagueId = "", toolMode = "random"; // estado en módulo: no re-rollear en cada render
  function rollShareText(r) {
    const stars = "★".repeat(r.difficulty) + "☆".repeat(5 - r.difficulty);
    return "⚽ RETO MODO CARRERA ⚽\n"
      + "Club: " + r.club + " (" + r.league + ")\n"

      + (r.twists.length ? "Reglas: " + r.twists.map(t => t.label).join(" · ") + "\n" : "")
      + "Dificultad: " + stars + "\n"
      + "¿Te atreves? #CarreraFC #ModoCarrera";
  }
  function toolCopy(txt) {
    const done = () => UI.toast("Reto copiado 📋", "ok");
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done, () => toolFallbackCopy(txt, done));
    else toolFallbackCopy(txt, done);
  }
  function toolFallbackCopy(txt, done) {
    try { const ta = document.createElement("textarea"); ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); done(); }
    catch (e) { UI.toast("Copia el texto del recuadro manualmente", "err"); }
  }

     SALÓN DE LA FAMA (Hall of Fame local, entre carreras)

  /* ============================================================
     FINANZAS Y FICHAJES
     ============================================================ */
  const TRANSFER_RULES = ["max-spend","sell-before-buy","free-agents-only","no-signings","no-loans","youth-only"];
  const TRANSFER_TYPE = { transfer:"Traspaso", free:"Libre", loan:"Cesión", youth:"Cantera" };
  let finLedgerDir = "all", finLedgerQ = ""; // estado del filtro del ledger (persiste entre re-renders)

  FC.views.finance = function () {
    const c = S.getActiveCareer();
    const season = S.currentSeason(c);
    const f = S.financeSummary(c, season.id);
    const M = U.money;
    // saldo acumulado de la temporada (solo movimientos con coste)
    const moves = (c.transfers || []).filter(t => t.seasonId === season.id && (Number(t.fee) || 0) !== 0)
      .slice().sort((a,b) => new Date(a.date||0) - new Date(b.date||0));
    let run = 0; const flow = moves.map(t => { run += (t.direction === "out" ? 1 : -1) * (Number(t.fee)||0); return run; });
    const maxBar = Math.max(f.spent, f.earned, 1);
    const moneyCh = (c.challenges || []).filter(ch => ch.status === "active" && (ch.rules||[]).some(r => TRANSFER_RULES.includes(r.ruleId)));

    UI.mount(`
      <div class="page-head">
        <div><h1>Finanzas y fichajes</h1>
          <div class="sub">${U.esc(season.label)} · ${f.inCount} altas · ${f.outCount} bajas · Balance ${M(f.net)}</div></div>
        <div class="flex gap center wrap">${seasonSelect(c)}
          <button class="btn btn-primary" id="fin-add"><span class="ni-icon" data-icon="plus"></span> Registrar movimiento</button></div>
      </div>

      <div class="card">
        <div class="field-row" style="align-items:end;margin-bottom:0">
          <div class="field" style="margin-bottom:0"><label>Presupuesto de fichajes de la temporada (€)</label>
            <input type="number" id="fin-budget" min="0" value="${f.budget || ""}" placeholder="p.ej. 50000000"/></div>
          <div class="field" style="margin-bottom:0"><label>&nbsp;</label><button class="btn btn-block" id="fin-budget-save"><span class="ni-icon" data-icon="coin"></span> Fijar presupuesto</button></div>
        </div>
        <p class="faint" style="font-size:12px;margin:10px 0 0">El dinero que te dio la junta esta temporada. Registrar aquí un movimiento es independiente de crear el jugador en Plantilla.</p>
      </div>

      <div class="grid cols-4 keep-2" style="margin-top:16px">
        ${statTile("Presupuesto", f.hasBudget ? M(f.budget) : "—", f.hasBudget ? "Fijado por la junta" : "Sin tope fijado")}
        ${statTile("Gastado", M(f.spent), f.inCount + " altas")}
        ${statTile("Ingresado", M(f.earned), f.outCount + " bajas")}
        ${f.hasBudget
          ? `<div class="card stat-tile"><div class="st-glow"></div><div class="st-label">Restante</div>
              <div class="st-value" style="${f.remaining < 0 ? "color:var(--danger)" : ""}">${M(f.remaining)}</div>
              <div class="st-sub">Balance ${f.net >= 0 ? "+" : ""}${M(f.net)}</div></div>`
          : statTile("Balance neto", (f.net >= 0 ? "+" : "") + M(f.net), "Saldo de traspasos")}
      </div>

      <div class="grid cols-2" style="margin-top:16px">
        <div class="card">
          <div class="card-head"><h3><span class="ni-icon" data-icon="coin"></span> Presupuesto consumido</h3></div>
          ${f.hasBudget
            ? `<div class="flex center gap" style="gap:18px">${CH.donut(f.pct, { size: 120, color: f.remaining < 0 ? "var(--danger)" : (f.remaining < f.budget * 0.1 ? "var(--warn)" : "var(--accent)") })}
                <div><div class="st-value" style="font-size:22px;${f.remaining < 0 ? "color:var(--danger)" : ""}">${M(f.remaining)}</div>
                  <div class="faint" style="font-size:12px">restante de ${M(f.budget)}</div></div></div>`
            : `<div class="empty" style="padding:22px"><div class="emoji">💰</div><p>Fija un presupuesto para ver cuánto te queda.</p>
                <button class="btn btn-ghost btn-sm" id="fin-budget-focus">Fijar presupuesto</button></div>`}
        </div>
        <div class="card">
          <div class="card-head"><h3><span class="ni-icon" data-icon="swap"></span> Gasto vs ingreso</h3></div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div><div class="flex between" style="font-size:13px;margin-bottom:6px"><span class="faint">Gastado</span><b>${M(f.spent)}</b></div>
              <div class="bar ${f.remaining != null && f.remaining < 0 ? "danger" : ""}"><i style="width:${Math.round(f.spent/maxBar*100)}%"></i></div></div>
            <div><div class="flex between" style="font-size:13px;margin-bottom:6px"><span class="faint">Ingresado</span><b>${M(f.earned)}</b></div>
              <div class="bar blue"><i style="width:${Math.round(f.earned/maxBar*100)}%"></i></div></div>
          </div>
          <div class="faint" style="font-size:12px;margin-top:14px">
            Mayor fichaje: ${f.topBuy ? U.esc(f.topBuy.player) + " · " + M(f.topBuy.fee) : "—"}<br>
            Mayor venta: ${f.topSale ? U.esc(f.topSale.player) + " · " + M(f.topSale.fee) : "—"}</div>
        </div>
      </div>

      <div class="card" style="margin-top:16px">
        <div class="card-head"><h3><span class="ni-icon" data-icon="table"></span> Movimiento de caja</h3></div>
        ${flow.length > 1 ? CH.line(flow, { h: 96, color: f.net >= 0 ? "var(--accent)" : "var(--danger)" }) : `<p class="faint">Registra movimientos con coste para ver la evolución del saldo.</p>`}
        <div class="faint" style="font-size:12px;margin-top:6px">Saldo acumulado de traspasos (ingresos − gastos)</div>
      </div>

      ${moneyCh.length ? `
      <div class="section-title">Impacto en tus retos</div>
      <div class="card"><div id="fin-rules"></div>
        <p class="faint" style="font-size:11px;margin:10px 0 0">«Tope de gasto» y «Vende antes de comprar» son globales (suman todas las temporadas); los KPIs de arriba son de esta temporada.</p></div>` : ""}

      <div class="section-title">Movimientos</div>
      <div class="card tight">
        <div class="flex gap center wrap mb">
          <div class="seg" id="fin-filter">
            <button type="button" data-fd="all" class="${finLedgerDir==='all'?'active':''}">Todos</button>
            <button type="button" data-fd="in" class="${finLedgerDir==='in'?'active':''}">Altas</button>
            <button type="button" data-fd="out" class="${finLedgerDir==='out'?'active':''}">Bajas</button>
          </div>
          <input type="search" id="fin-q" placeholder="Buscar jugador o club" style="max-width:240px" value="${U.esc(finLedgerQ)}"/>
        </div>
        <div class="table-wrap"><table class="tbl"><thead><tr>
          <th>Fecha</th><th>Mov.</th><th>Jugador</th><th>Tipo</th><th>Procedencia / Destino</th><th class="num">Importe</th><th></th>
        </tr></thead><tbody id="fin-rows"></tbody></table></div>
      </div>
    `);

    document.getElementById("fin-add").addEventListener("click", () => transferModal(c));
    document.getElementById("fin-budget-save").addEventListener("click", () => {
      S.setTransferBudget(c, season.id, document.getElementById("fin-budget").value); UI.toast("Presupuesto fijado", "ok");
    });
    const focusBtn = document.getElementById("fin-budget-focus");
    if (focusBtn) focusBtn.addEventListener("click", () => { const i = document.getElementById("fin-budget"); i.focus(); i.scrollIntoView({ block: "center", behavior: "smooth" }); });

    if (moneyCh.length) renderFinanceRules(c, moneyCh);

    // ledger filtrable: el estado del filtro vive a nivel de módulo (finLedgerDir/
    // finLedgerQ), así sobrevive al re-render global que disparan editar/borrar.
    const all = (c.transfers || []).filter(t => t.seasonId === season.id).slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
    function paintRows() {
      const q = (finLedgerQ || "").toLowerCase();
      const rows = all.filter(t => (finLedgerDir === "all" || t.direction === finLedgerDir)
        && (!q || (t.player||"").toLowerCase().includes(q) || (t.club||"").toLowerCase().includes(q)));
      const tb = document.getElementById("fin-rows");
      tb.innerHTML = rows.length ? rows.map(t => { const isIn = t.direction === "in";
        return `<tr data-tr="${t.id}" style="cursor:pointer">
          <td class="faint">${U.fmtDate(t.date) || "—"}</td>
          <td><span class="chip ${isIn ? "accent" : "danger"}">${isIn ? "Alta" : "Baja"}</span></td>
          <td><b>${U.esc(t.player)}</b></td>
          <td><span class="chip">${U.esc(TRANSFER_TYPE[t.type] || t.type || "—")}</span></td>
          <td class="faint">${U.esc(t.club || "—")}</td>
          <td class="num" style="color:${isIn ? "var(--danger)" : "var(--ok)"};font-variant-numeric:tabular-nums">${isIn ? "−" : "+"}${U.money(t.fee)}</td>
          <td><button class="icon-btn sm" data-del-tr="${t.id}"><span class="ni-icon" data-icon="trash"></span></button></td></tr>`;
      }).join("") : `<tr><td colspan="7"><div class="empty" style="padding:26px"><div class="emoji">💰</div><h3>Sin movimientos</h3><p>Registra altas y bajas para llevar tus finanzas.</p></div></td></tr>`;
      U.hydrateIcons(tb);
      tb.querySelectorAll("[data-del-tr]").forEach(b => b.addEventListener("click", (e) => { e.stopPropagation();
        UI.confirm("¿Eliminar este movimiento?", () => { S.deleteTransfer(c, b.dataset.delTr); UI.toast("Movimiento eliminado"); }, true); }));
      tb.querySelectorAll("[data-tr]").forEach(r => r.addEventListener("click", (e) => {
        if (e.target.closest("[data-del-tr]")) return;
        transferModal(c, all.find(t => t.id === r.dataset.tr)); }));
    }
    document.querySelectorAll("#fin-filter button").forEach(b => b.addEventListener("click", () => {
      finLedgerDir = b.dataset.fd; document.querySelectorAll("#fin-filter button").forEach(x => x.classList.toggle("active", x === b)); paintRows(); }));
    document.getElementById("fin-q").addEventListener("input", (e) => { finLedgerQ = e.target.value; paintRows(); });
    paintRows();
  };

  function renderFinanceRules(c, challenges) {
    const box = document.getElementById("fin-rules");
    if (!box) return;
    box.innerHTML = challenges.map(ch => {
      const viol = S.ruleViolations(c, ch).filter(v => TRANSFER_RULES.includes(v.ruleId));
      const labels = (ch.rules||[]).filter(r => TRANSFER_RULES.includes(r.ruleId)).map(r => D.RULES[r.ruleId] ? D.RULES[r.ruleId].label : r.ruleId);
      return `<div class="list-row" data-goto="challenges" style="cursor:pointer;align-items:flex-start">
        <span class="ni-icon" data-icon="${viol.length ? "flag" : "check"}" style="color:${viol.length ? "var(--danger)" : "var(--accent)"};margin-top:2px"></span>
        <div class="lr-main"><b>${U.esc(ch.name)}</b><small>${U.esc(labels.join(" · "))}</small>
          ${viol.length
            ? viol.map(v => `<div class="faint" style="font-size:12px;margin-top:3px">• ${U.esc(v.text)}</div>`).join("")
            : `<div class="chip accent" style="margin-top:6px"><span class="ni-icon" data-icon="check"></span> Reto limpio</div>`}</div>
        <span class="ni-icon" data-icon="chevron" style="color:var(--text-dim)"></span></div>`;
    }).join("");
    U.hydrateIcons(box);
  }

  function transferModal(c, ex) {
    ex = ex || {};
    const season = S.currentSeason(c);
    const dir0 = ex.direction || "in";
    const typeOpts = [["transfer","Traspaso"],["free","Libre"],["loan","Cesión"],["youth","Cantera"]]
      .map(([v,l]) => `<option value="${v}" ${v===(ex.type||"transfer")?"selected":""}>${l}</option>`).join("");
    UI.openModal(ex.id ? "Editar movimiento" : "Registrar movimiento", `
      ${playersDatalist(c, "dl-tr-players")}
      <div class="field-row">
        <div class="field"><label>Movimiento</label><select id="t-dir">
          <option value="in" ${dir0==="in"?"selected":""}>Alta (entra al club)</option>
          <option value="out" ${dir0==="out"?"selected":""}>Baja (sale del club)</option></select></div>
        <div class="field"><label>Tipo</label><select id="t-type">${typeOpts}</select></div>
      </div>
      <div class="field"><label>Jugador</label><input type="text" id="t-player" list="dl-tr-players" value="${U.esc(ex.player||"")}" placeholder="Nombre del jugador"/></div>
      <div class="field-row">
        <div class="field"><label id="t-fee-label">${dir0==="out"?"Ingreso por venta (€)":"Coste (€)"}</label><input type="number" id="t-fee" min="0" value="${ex.fee!=null?ex.fee:""}" placeholder="0"/></div>
        <div class="field"><label id="t-club-label">${dir0==="out"?"Destino":"Procedencia"}</label><input type="text" id="t-club" value="${U.esc(ex.club||"")}" placeholder="Club"/></div>
      </div>
      <div class="field"><label>Fecha</label><input type="date" id="t-date" value="${ex.date||""}"/></div>
    `, `<button class="btn btn-ghost" data-close>Cancelar</button><button class="btn btn-primary" id="t-save"><span class="ni-icon" data-icon="check"></span> Guardar</button>`);
    const dirSel = document.getElementById("t-dir");
    dirSel.addEventListener("change", () => { const out = dirSel.value === "out";
      document.getElementById("t-fee-label").textContent = out ? "Ingreso por venta (€)" : "Coste (€)";
      document.getElementById("t-club-label").textContent = out ? "Destino" : "Procedencia"; });
    document.getElementById("t-save").addEventListener("click", () => {
      const player = document.getElementById("t-player").value.trim();
      if (!player) { UI.toast("Indica el jugador", "err"); return; }
      const fee = Number(document.getElementById("t-fee").value) || 0;
      if (!Number.isFinite(fee) || fee < 0) { UI.toast("El importe debe ser 0 o más", "err"); return; }
      const data = { seasonId: season.id, direction: dirSel.value, player,
        type: document.getElementById("t-type").value, fee,
        club: document.getElementById("t-club").value.trim(), date: document.getElementById("t-date").value };
      if (ex.id) S.updateTransfer(c, ex.id, data); else S.addTransfer(c, data);
      UI.closeModal(); UI.toast(ex.id ? "Movimiento actualizado" : "Movimiento registrado ⚽", "ok");
    });
  }

     RETOS + LOGROS
     ============================================================ */

          <div class="ach-medal tier-${a.tier}">${a.emoji}</div><div class="ach-name">${U.esc(a.name)}</div>
          <div class="ach-desc">${U.esc(a.desc)}</div><div class="chip tier-${a.tier}" style="margin-top:8px;font-size:10px">${D.TIER_LABEL[a.tier]}</div></div>`; }).join("")}

  function renderActiveChallenges(c) {
    const box = document.getElementById("ch-active");
    const active = (c.challenges || []).filter(ch => ch.status === "active");
    if (!active.length) { box.innerHTML = `<p class="faint">No tienes retos activos. Activa uno del catálogo o crea el tuyo.</p>`; return; }
    box.innerHTML = active.map(ch => {
      const viol = S.ruleViolations(c, ch);
      return `<div class="card" style="margin-bottom:12px">
        <div class="flex between center"><div><h3 style="margin:0">${U.esc(ch.name)}</h3>
          <div class="cc-rules" style="margin-top:8px">${(ch.rules||[]).map(r => `<span class="chip">${U.esc(D.RULES[r.ruleId]?D.RULES[r.ruleId].label:r.ruleId)}${r.params&&r.params.nationality?": "+U.esc(r.params.nationality):""}${r.params&&r.params.amount?": "+FC.util.money(r.params.amount):""}${r.params&&r.params.age?": ≤"+U.esc(r.params.age):""}</span>`).join("")}</div></div>
